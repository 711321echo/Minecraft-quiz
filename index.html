<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minecraft Quiz</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;color:#fff;background:radial-gradient(circle at top,#3fa34d55,transparent 36%),linear-gradient(135deg,#101b10,#050805 60%,#241507);display:flex;align-items:center;justify-content:center;padding:14px}.app{width:100%;max-width:780px;background:#101510ee;border:4px solid #3b2a16;border-radius:24px;overflow:hidden;box-shadow:0 24px 80px #000a}.hero{text-align:center;padding:30px 18px 22px;background:linear-gradient(45deg,#4b2d16 25%,transparent 25%),linear-gradient(-45deg,#4b2d16 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#4b2d16 75%),linear-gradient(-45deg,transparent 75%,#4b2d16 75%),#2e8b36;background-size:34px 34px;background-position:0 0,0 17px,17px -17px,-17px 0;border-bottom:5px solid #15100b}h1{margin:0;font-size:clamp(36px,8vw,72px);text-shadow:4px 4px 0 #000,7px 7px 0 #0006}.subtitle{margin-top:10px;font-size:17px}.screen{padding:22px}.panel{background:#ffffff10;border:3px solid #ffffff22;border-radius:20px;padding:18px}.levels{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin:18px 0 22px}button{font-family:inherit;cursor:pointer;touch-action:manipulation}.level,.option,.start,.next,.again{border:0;border-radius:14px;font-weight:900;color:#fff}.level{min-height:82px;padding:15px;font-size:20px;background:linear-gradient(#43a13c,#205b1e);border:3px solid transparent;box-shadow:inset 0 -5px 0 #0004,0 8px 0 #0003}.level span{display:block;font-size:13px;margin-top:6px;opacity:.85}.level.selected{border-color:#ffdd57;filter:brightness(1.16);transform:translateY(-2px)}.normal{background:linear-gradient(#3986df,#17477e)}.zor{background:linear-gradient(#d18427,#82430d)}.imkansiz{background:linear-gradient(#8d2bd4,#44116f)}.start,.again{width:100%;padding:18px;font-size:23px;background:linear-gradient(#ffd75b,#bd7d12);color:#231300;box-shadow:inset 0 -6px 0 #0003,0 8px 0 #0003}.topbar{display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px}.badge{background:#0006;border:2px solid #ffffff22;padding:9px 12px;border-radius:999px;font-weight:900}.question{font-size:clamp(23px,4.5vw,34px);font-weight:900;line-height:1.25;margin:8px 0 18px}.options{display:grid;gap:12px}.option{text-align:left;padding:17px;font-size:18px;background:#ffffff18;border:3px solid #ffffff22}.option:disabled{opacity:1}.correct{background:#299b43!important;border-color:#9aff9e!important}.wrong{background:#a72e2e!important;border-color:#ff9696!important}.feedback{min-height:34px;margin-top:14px;font-size:18px;font-weight:900}.next{width:100%;margin-top:8px;padding:15px;font-size:19px;background:linear-gradient(#62a0ff,#2359b3)}.hidden{display:none!important}.result-title{text-align:center;font-size:clamp(34px,7vw,62px);font-weight:900}.rank{text-align:center;font-size:28px;font-weight:900;color:#ffdd57;text-shadow:2px 2px #000}.scorebig{text-align:center;font-size:22px;margin:15px 0}.bar{height:23px;background:#ffffff18;border:2px solid #ffffff22;border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#32bd55,#ffdd57)}.note{text-align:center;line-height:1.45;opacity:.9}@media(max-width:540px){.levels{grid-template-columns:1fr}.screen{padding:16px}}
</style>
</head>
<body>
<main class="app">
<section class="hero"><h1>⛏️ Minecraft Quiz</h1><div class="subtitle">12 soru • 4 seçenek • Sonunda ünvanın çıkar</div></section>
<section id="home" class="screen"><div class="panel"><h2>Zorluk seç</h2><div class="levels">
<button type="button" class="level selected" onclick="selectLevel('kolay',this)">Kolay<span>Yeni başlayan madenciler</span></button>
<button type="button" class="level normal" onclick="selectLevel('normal',this)">Normal<span>Crafting bilenler</span></button>
<button type="button" class="level zor" onclick="selectLevel('zor',this)">Zor<span>Nether görmüş oyuncular</span></button>
<button type="button" class="level imkansiz" onclick="selectLevel('imkansiz',this)">İmkansız<span>Ender Dragon avcıları</span></button>
</div><button type="button" class="start" onclick="startGame()">Başla</button></div></section>
<section id="quiz" class="screen hidden"><div class="topbar"><div class="badge" id="difficultyBadge">Kolay</div><div class="badge" id="progressBadge">Soru 1/12</div><div class="badge" id="scoreBadge">Puan: 0</div></div><div class="panel"><div class="question" id="questionText"></div><div class="options" id="options"></div><div class="feedback" id="feedback"></div><button type="button" id="nextBtn" class="next hidden" onclick="nextQuestion()">Sonraki soru</button></div></section>
<section id="result" class="screen hidden"><div class="panel"><div class="result-title">🏆 Sonuç</div><div class="rank" id="rankText"></div><div class="scorebig" id="finalScore"></div><div class="bar"><div class="fill" id="fill"></div></div><p class="note" id="resultNote"></p><button type="button" class="again" onclick="goHome()">Tekrar oyna</button></div></section>
</main>
<script>
var questionBank={kolay:[['Minecraft’ta ağaçtan ilk ne elde edilir?',['Tahta','Elmas','Obsidyen','Redstone'],0],['Creeper ne yapmasıyla ünlüdür?',['Patlar','Uçar','Ticaret yapar','Ekin eker'],0],['Yatak ne işe yarar?',['Geceyi atlatmaya','Maden kazmaya','Canavar çağırmaya','Lav üretmeye'],0],['Fırında yiyecek pişirmek için ne kullanılır?',['Yakıt','Yün','Cam','Deri'],0],['İnekten hangisi elde edilir?',['Deri','Redstone','Ender Pearl','Blaze Rod'],0],['Suyu taşımak için ne kullanılır?',['Kova','Ok','Kalkan','Kapı'],0],['Zombi en çok ne zaman ortaya çıkar?',['Gece','Gündüz','Sadece denizde','Sadece köyde'],0],['Elmas genelde nerede aranır?',['Yer altında','Bulutların üstünde','Ağaç yaprağında','Köy çatısında'],0],['Crafting table kaçlık alan sağlar?',['3x3','1x1','2x1','5x5'],0],['Koyundan ne elde edilir?',['Yün','Altın','Kemik','Kömür'],0],['Canı doldurmaya ne yardım eder?',['Yemek','Toprak','Çakıl','Kapı'],0],['Kazma yapmak için genelde ne gerekir?',['Çubuk ve malzeme','Kum ve su','Yün ve boya','Balık ve kova'],0]],normal:[['Nether’a gitmek için hangi blok gerekir?',['Obsidyen','Kumtaşı','Bakır','Yaprak'],0],['Demir cevheri eritilince ne olur?',['Demir külçesi','Altın elma','Cam','Kitap'],0],['Enderman öldürülünce ne düşürebilir?',['Ender Pearl','Slime Ball','Blaze Powder','String'],0],['Blaze genelde nerede bulunur?',['Nether Fortress','Ocean Monument','Village','Mineshaft'],0],['Redstone ne için kullanılır?',['Mekanizma yapmak','Yemek pişirmek','Zırh boyamak','Uyumak'],0],['Anvil ne işe yarar?',['Eşya tamiri ve isimlendirme','Odun kesme','Balık tutma','Tarla sulama'],0],['Enchanting table için hangi eşya önemlidir?',['Lapis Lazuli','Kum','Kil','Yumurta'],0],['Köylülerle ne yapılabilir?',['Ticaret','Portala binme','Boss çağırma','Bulut yapma'],0],['Mending büyüsü ne yapar?',['XP ile eşyayı tamir eder','Eşyayı yakar','Canavarı dondurur','Geceyi uzatır'],0],['Slime çoğunlukla ne düşürür?',['Slimeball','Emerald','Prismarine','Quartz'],0],['Harita yapmakta hangi malzeme kullanılır?',['Kağıt','Yumurta','Deri zırh','Kömür bloğu'],0],['Kalkan neye karşı işe yarar?',['Ok ve yakın saldırılar','Açlık','Lav tamamen','Düşme tamamen'],0]],zor:[['Wither çağırmak için ne gerekir?',['Soul sand/soil ve Wither Skeleton kafası','Obsidyen ve elmas','Netherrack ve Blaze Rod','End stone ve yumurta'],0],['Elytra nerede bulunur?',['End City gemilerinde','Köy kuyusunda','Nether portalında','Mineshaft girişinde'],0],['Totem of Undying kimden düşer?',['Evoker','Pillager','Vindicator','Witch'],0],['Beacon çalışması için ne gerekir?',['Mineral piramidi','Sadece meşale','Suda bekletmek','Kitaplık'],0],['Silk Touch ne sağlar?',['Bazı blokları olduğu gibi alma','Daha hızlı koşma','Can yenileme','Patlama gücü'],0],['Fortune neyi artırabilir?',['Cevher düşüş miktarını','Uyku hızını','Yüzme hızını','Zırh rengini'],0],['Ocean Monument içindeki güçlü yaratık?',['Elder Guardian','Ravager','Ghast','Husk'],0],['Netherite yapmak için gereken kaynak?',['Ancient Debris','Raw Copper','Amethyst','Calcite'],0],['Respawn Anchor hangi boyutta işe yarar?',['Nether','Overworld','End','Hepsinde güvenli'],0],['Shulker Box neden değerlidir?',['İçindeki eşyaları koruyarak taşınır','Sonsuz ok verir','Lavı siler','Ejderhayı çağırır'],0],['Potion of Weakness + golden apple ne içindir?',['Zombie villager iyileştirmek','Wither çağırmak','Elytra tamir etmek','Obsidyen kırmak'],0],['Raid başlatmaya hangi etki sebep olur?',['Bad Omen','Haste','Night Vision','Water Breathing'],0]],imkansiz:[['Chunk kaç blok genişliğindedir?',['16x16','8x8','32x32','64x64'],0],['Comparator’ın işlevlerinden biri nedir?',['Sinyal karşılaştırmak/ölçmek','Blok eritmek','Mob doğurmak','Büyü silmek'],0],['Hopper ne yapar?',['Eşya transfer eder','Işık üretir','Portalı açar','Su kaynağı yapar'],0],['Sculk sensor ne algılar?',['Titreşim','Işık rengi','Oyuncu seviyesi','Zırh türü'],0],['Warden hangi bölgede ortaya çıkar?',['Deep Dark','Mushroom Fields','Warm Ocean','Badlands'],0],['Lectern hangi mesleği verir?',['Librarian','Farmer','Cleric','Fletcher'],0],['Repeater’ın ana işlevlerinden biri nedir?',['Sinyali geciktirmek ve yenilemek','Cevher çoğaltmak','Can basmak','Yatak yapmak'],0],['Mushroom Fields’ın özel yanı nedir?',['Düşman mob doğumu çok sınırlıdır','Her zaman lav yağar','Elmas yüzeyde çıkar','Köyler uçabilir'],0],['End Crystal neyle ilişkilidir?',['Dragon iyileştirme ve patlama','Köylü takası','Harita büyütme','Balık yakalama'],0],['Iron farm mantığında ne kritik rol oynar?',['Villager ve golem mekaniği','Sadece tavuk','Sadece balık','Sadece slime'],0],['F3 ekranı genelde ne için kullanılır?',['Koordinat ve teknik bilgi','Skin değiştirmek','Server kapatmak','Shader indirmek'],0],['Nether çatısına çıkmak özellikle hangi sürümde popülerdir?',['Java Edition','Bedrock güvenli varsayılan','Education sadece','Classic sadece'],0]]};
var selectedLevel='kolay',questions=[],index=0,score=0,locked=false;
function $(id){return document.getElementById(id)}
function shuffle(a){var c=a.slice();for(var i=c.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=c[i];c[i]=c[j];c[j]=t}return c}
function levelName(l){return {kolay:'Kolay',normal:'Normal',zor:'Zor',imkansiz:'İmkansız'}[l]}
function selectLevel(level,btn){selectedLevel=level;var els=document.getElementsByClassName('level');for(var i=0;i<els.length;i++){els[i].classList.remove('selected')}btn.classList.add('selected')}
function startGame(){questions=shuffle(questionBank[selectedLevel]).slice(0,12);index=0;score=0;$('home').classList.add('hidden');$('result').classList.add('hidden');$('quiz').classList.remove('hidden');$('difficultyBadge').textContent=levelName(selectedLevel);showQuestion()}
function showQuestion(){locked=false;var q=questions[index];$('questionText').textContent=q[0];$('progressBadge').textContent='Soru '+(index+1)+'/12';$('scoreBadge').textContent='Puan: '+score;$('feedback').textContent='';$('nextBtn').classList.add('hidden');$('options').innerHTML='';var opts=[];for(var i=0;i<q[1].length;i++){opts.push({text:q[1][i],correct:i===q[2]})}opts=shuffle(opts);for(var k=0;k<opts.length;k++){var b=document.createElement('button');b.type='button';b.className='option';b.textContent=opts[k].text;b.setAttribute('data-correct',opts[k].correct?'1':'0');b.onclick=function(){chooseAnswer(this,this.getAttribute('data-correct')==='1')};$('options').appendChild(b)}}
function chooseAnswer(button,isCorrect){if(locked)return;locked=true;var all=document.getElementsByClassName('option');for(var i=0;i<all.length;i++){all[i].disabled=true}if(isCorrect){score++;button.classList.add('correct');$('feedback').textContent='✅ Doğru! Madenci refleksi sağlam.'}else{button.classList.add('wrong');var right=questions[index][1][questions[index][2]];for(var j=0;j<all.length;j++){if(all[j].textContent===right){all[j].classList.add('correct')}}$('feedback').textContent='❌ Yanlış. Creeper sessiz geldi.'}$('scoreBadge').textContent='Puan: '+score;$('nextBtn').textContent=index===questions.length-1?'Sonucu gör':'Sonraki soru';$('nextBtn').classList.remove('hidden')}
function nextQuestion(){index++;if(index>=questions.length){showResult()}else{showQuestion()}}
function showResult(){$('quiz').classList.add('hidden');$('result').classList.remove('hidden');var percent=Math.round(score/12*100);$('fill').style.width=percent+'%';$('finalScore').textContent=score+'/12 doğru — %'+percent;var rank,note;if(score<=3){rank='Toprak Yumruklayan Yeni Oyuncu';note='Temel bilgileri biraz çalışman lazım. Panik yok, herkes ilk gece zombiye yakalanır.'}else if(score<=6){rank='Taş Kazmalı Maceracı';note='Oyunu biliyorsun ama Nether kapısında hâlâ dikkatli olman lazım.'}else if(score<=9){rank='Elmas Zırhlı Usta';note='Gayet iyi. Bu bilgiyle çoğu oyuncuya ders verirsin.'}else if(score<=11){rank='Netherite Şampiyonu';note='Çok sağlam skor. Creeper seni değil, sen Creeper’ı korkutuyorsun.'}else{rank='Ender Dragon’un Kabusu';note='Tam puan. Bu artık quiz değil, güç gösterisi.'}$('rankText').textContent=rank;$('resultNote').textContent=note}
function goHome(){$('result').classList.add('hidden');$('home').classList.remove('hidden')}
</script>
</body>
</html>
